                     <h3 className="font-black text-lg mb-3 flex items-center gap-2"><Route size={20}/> Authentic City Walk (地道城市漫步)</h3>
                     <div className="flex items-center gap-2 overflow-x-auto pb-2">
                        {randomRoute.map((item, idx) => (
                          <React.Fragment key={item.id}>
                            <div 
                              onClick={() => onOpenDetail(item)}
                              className="bg-white px-3 py-2 rounded-xl border-2 border-[#2D2D2D] text-xs font-bold whitespace-nowrap cursor-pointer hover:bg-yellow-100 transition-colors"
                            >
                              {CATEGORIES.find(c => c.id === item.category)?.emoji} {item.actionTitle}
                            </div>
                            {idx < 2 && <ArrowRight size={16} className="text-[#2D2D2D] flex-shrink-0" />}
                          </React.Fragment>
                        ))}
                     </div>
                  </div>
                )}

                {(activeTab === 'collection' ? collectionList : footprintList).length === 0 ? (
                  <div className="text-center py-12">
                    <div className="text-6xl mb-4 grayscale opacity-50">🏝️</div>
                    <p className="font-bold text-gray-400">Nothing here yet. Go explore!</p>
                  </div>
                ) : (
                  (activeTab === 'collection' ? collectionList : footprintList).map(post => {
                    const cat = CATEGORIES.find(c => c.id === post.category) || CATEGORIES[0];
                    return (
                      <div key={post.id} className="bg-white border-2 border-[#2D2D2D] rounded-2xl p-4 flex items-center justify-between shadow-sm hover:shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] transition-all">
                        <div className="flex items-center gap-4">
                          <div className={`w-14 h-14 rounded-2xl border-2 border-[#2D2D2D] flex items-center justify-center text-3xl ${cat.color}`}>{cat.emoji}</div>
                          <div>
                            <h4 className="font-black text-[#2D2D2D] text-lg">{post.actionTitle}</h4>
                            <p className="text-xs text-gray-500 font-bold">{post.locationName}</p>
                            {activeTab === 'footprint' && <span className="text-[10px] bg-gray-100 px-2 py-0.5 rounded text-gray-500 font-bold mt-1 inline-block">By You</span>}
                          </div>
                        </div>
                        <div className="flex gap-2">
                           {activeTab === 'collection' ? (
                             <button onClick={() => toggleSave(post.id)} className="w-10 h-10 flex items-center justify-center bg-red-100 hover:bg-red-200 border-2 border-[#2D2D2D] rounded-xl text-red-500 transition-colors"><Trash2 size={20} /></button>
                           ) : (
                             <>
                              <button onClick={() => onEditPost(post)} className="w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-gray-200 border-2 border-[#2D2D2D] rounded-xl text-[#2D2D2D] transition-colors"><Edit3 size={18} /></button>
                              <button onClick={() => onDeletePost(post.id)} className="w-10 h-10 flex items-center justify-center bg-red-100 hover:bg-red-200 border-2 border-[#2D2D2D] rounded-xl text-red-500 transition-colors"><Trash2 size={18} /></button>
                             </>
                           )}
                        </div>
                      </div>
                    )
                  })
                )}
              </div>
              
              {showDbConfig && <DBConfigModal onClose={() => setShowDbConfig(false)} />}
            </div>
          );
        };

        // --- 5. Main App ---
        function App() {
          const [currentTab, setCurrentTab] = useState('home'); 
          const [mode, setMode] = useState(null); 
          const [posts, setPosts] = useState([]);
          const [selectedPost, setSelectedPost] = useState(null);
          
          // NEW: Selected Forum Post state
          const [selectedForumPost, setSelectedForumPost] = useState(null);

          const [editingPost, setEditingPost] = useState(null);
          const [showSplash, setShowSplash] = useState(true); // Control Splash Screen
          
          const [myPosts, setMyPosts] = useState([]);

          const [savedPosts, setSavedPosts] = useState(() => {
            const saved = localStorage.getItem('london_potluck_saved');
            return saved ? JSON.parse(saved) : [];
          });

          const toggleSave = (id) => {
            setSavedPosts(prev => {
              const newSaved = prev.includes(id) ? prev.filter(pid => pid !== id) : [...prev, id];
              localStorage.setItem('london_potluck_saved', JSON.stringify(newSaved));
              return newSaved;
            });
          };

          useEffect(() => {
            const q = query(collection(db, "potlucks"), orderBy("createdAt", "desc"));
            // Added error handling to onSnapshot to catch permission-denied errors
            const unsubscribe = onSnapshot(q, 
                (snapshot) => {
                  const fetchedPosts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                  setPosts(fetchedPosts.length > 0 ? fetchedPosts : MOCK_TRACES);
                  setMyPosts(fetchedPosts.filter((_, i) => i % 3 === 0)); 
                },
                (error) => {
                    console.error("Potluck listener error (likely permissions):", error);
                    // Fallback to mock data if backend fails
                    setPosts(MOCK_TRACES);
                    setMyPosts(MOCK_TRACES);
                }
            );
            return () => unsubscribe();
          }, []);

          const handleDelete = async (id) => {
            if (window.confirm("Are you sure you want to delete this gem?")) {
              try {
                await deleteDoc(doc(db, "potlucks", id));
              } catch (error) {
                // console.error("Error deleting post:", error);
                alert("Demo Mode: Deletion disabled by server rules.");
              }
            }
          };

          const handleUpdate = async (id, newData) => {
            try {
              const postRef = doc(db, "potlucks", id);
              await updateDoc(postRef, newData);
              setEditingPost(null); // Close modal
            } catch (error) {
              // console.error("Error updating post:", error);
              alert("Demo Mode: Updates disabled by server rules.");
            }
          };

          const Navigation = () => (
            <nav className="bg-white border-t-2 border-[#2D2D2D] h-20 flex justify-around items-center z-50 fixed bottom-0 left-0 right-0 w-full pb-safe">
              {['home', 'map', 'forum', 'profile'].map(tab => (
                <button 
                  key={tab}
                  onClick={() => {setCurrentTab(tab); setMode(null)}} 
                  className="flex flex-col items-center justify-center w-full h-full relative group"
                >
                  <div className={`transition-all duration-300 transform ${currentTab === tab ? '-translate-y-2' : ''}`}>
                    {tab === 'home' && <Smile size={32} strokeWidth={currentTab === tab ? 3 : 2} className={currentTab === tab ? 'text-[#2D2D2D]' : 'text-gray-300'} />}
                    {tab === 'map' && <MapIcon size={32} strokeWidth={currentTab === tab ? 3 : 2} className={currentTab === tab ? 'text-[#2D2D2D]' : 'text-gray-300'} />}
                    {tab === 'forum' && <MessageCircle size={32} strokeWidth={currentTab === tab ? 3 : 2} className={currentTab === tab ? 'text-[#2D2D2D]' : 'text-gray-300'} />}
                    {tab === 'profile' && <User size={32} strokeWidth={currentTab === tab ? 3 : 2} className={currentTab === tab ? 'text-[#2D2D2D]' : 'text-gray-300'} />}
                  </div>
                  {currentTab === tab && <div className="absolute bottom-2 w-1.5 h-1.5 bg-[#2D2D2D] rounded-full"></div>}
                </button>
              ))}
            </nav>
          );

          const FloatingDock = () => (
            <div className="fixed bottom-24 left-0 right-0 z-40 flex justify-center pointer-events-none animate-slide-up">
              <div className="pointer-events-auto bg-white/90 backdrop-blur-md border-2 border-[#2D2D2D] rounded-full p-2 shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] flex gap-2">
                <button 
                  onClick={() => setMode('explore-wizard')}
                  className="bg-[#4D96FF] hover:bg-[#3a85ee] text-white rounded-full py-3 px-6 flex items-center justify-center gap-2 transition-all border-2 border-[#2D2D2D] hover:-translate-y-0.5"
                >
                  <Compass size={20} strokeWidth={3} />
                  <span className="font-black">Explore</span>
                </button>
                <button 
                  onClick={() => setMode('share')}
                  className="bg-[#FFD93D] hover:bg-[#ffe066] text-[#2D2D2D] rounded-full py-3 px-6 flex items-center justify-center gap-2 transition-all border-2 border-[#2D2D2D] hover:-translate-y-0.5"
                >
                  <PlusCircle size={20} strokeWidth={3} />
                  <span className="font-black">Share</span>
                </button>
              </div>
            </div>
          );

          return (
            <div className="w-full min-h-screen bg-[#FFFBF0] flex flex-col font-sans text-[#2D2D2D] overflow-hidden selection:bg-yellow-200">
              <style>{`
                @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
                body { font-family: 'Nunito', sans-serif; }
                .leaflet-container { font-family: 'Nunito', sans-serif; background: #FFFBF0; }
                .scrollbar-hide::-webkit-scrollbar { display: none; }
                @keyframes fade-in-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                .animate-fade-in-up { animation: fade-in-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                .animate-slide-up { animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                @keyframes slide-up { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
                .animate-bounce-in { animation: bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
                @keyframes bounce-in { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
                .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
              `}</style>
              
              {/* Splash Screen Conditionally Rendered */}
              {showSplash && <SplashScreen onFinish={() => setShowSplash(false)} />}

              {/* Main Container updated: Added md:overflow-y-auto to allow scrolling on desktop when map is tall */}
              <main className="flex-1 w-full relative flex flex-col h-full overflow-hidden md:overflow-y-auto">
                {mode === 'explore-wizard' && (
                  <ExploreWizard 
                    posts={posts} 
                    onClose={() => setMode(null)} 
                    onFinish={(mission) => { setSelectedPost(mission); setMode(null); }}
                  />
                )}
                
                {mode === 'share' ? (
                  <ShareForm goBack={() => setMode(null)} />
                ) : (
                  <>
                    {currentTab === 'home' && mode !== 'explore-wizard' && (
                      <>
                        <HomeFlow traces={posts} onOpenDetail={setSelectedPost} savedPosts={savedPosts} toggleSave={toggleSave} />
                        <FloatingDock />
                      </>
                    )}
                    
                    {currentTab === 'map' && (
                      <DiscoverView posts={posts} onOpenDetail={setSelectedPost} />
                    )}

                    {currentTab === 'forum' && (
                      <ForumView onOpenPost={setSelectedForumPost} />
                    )}
                    
                    {currentTab === 'profile' && (
                      <ProfileView 
                        savedPosts={savedPosts} 
                        posts={posts} 
                        myPosts={myPosts} 
                        toggleSave={toggleSave}
                        onOpenDetail={setSelectedPost}
                        onDeletePost={handleDelete}
                        onEditPost={setEditingPost}
                      />
                    )}
                  </>
                )}
              </main>

              {mode !== 'share' && <Navigation />}

              {selectedPost && (
                <PostDetailModal 
                  post={selectedPost} 
                  onClose={() => setSelectedPost(null)} 
                  isSaved={savedPosts.includes(selectedPost.id)}
                  onToggleSave={() => toggleSave(selectedPost.id)}
                />
              )}

              {/* Forum Post Detail Modal */}
              {selectedForumPost && (
                <ForumPostDetailModal
                    post={selectedForumPost}
                    onClose={() => setSelectedForumPost(null)}
                />
              )}

              {editingPost && (
                <EditPostModal
                  post={editingPost}
                  onClose={() => setEditingPost(null)}
                  onSave={handleUpdate}
                />
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
