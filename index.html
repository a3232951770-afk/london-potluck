<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Potluck</title>
    
    <!-- 1. 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet JS 直接加载 -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- 3. 配置 Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
    </script>

    <!-- 4. 引入 Babel (锁定版本以保持稳定) -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <style>
        /* 全局样式补充 */
        body { margin: 0; padding: 0; background-color: #FFFBF0; }
        /* 隐藏滚动条但保留功能 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 开屏动画相关 Keyframes */
        @keyframes bounce-sequence {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-bounce-1 { animation: bounce-sequence 1s infinite; animation-delay: 0s; }
        .animate-bounce-2 { animation: bounce-sequence 1s infinite; animation-delay: 0.2s; }
        .animate-bounce-3 { animation: bounce-sequence 1s infinite; animation-delay: 0.4s; }
        .animate-bounce-4 { animation: bounce-sequence 1s infinite; animation-delay: 0.6s; }
        
        @keyframes fade-out {
            from { opacity: 1; visibility: visible; }
            to { opacity: 0; visibility: hidden; }
        }
        .animate-fade-out {
            animation: fade-out 0.8s ease-out forwards;
            animation-delay: 2.2s; /* 动画持续时间后开始淡出 */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 5. 你的 React 代码 -->
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, query, orderBy, serverTimestamp, onSnapshot, deleteDoc, doc, updateDoc, increment } from "firebase/firestore";
        import { getAuth, signInAnonymously } from "firebase/auth";
        import { 
          Compass, PlusCircle, Smile, Map as MapIcon, User, ArrowLeft, 
          MapPin, List, Settings, Clock, Image as ImageIcon, X, 
          Hash, Star, Trash2, Search, Award, Route, Coffee, ArrowRight, Edit3, Save, Globe,
          MessageCircle, Heart, MessageSquare, Send, PenTool, Database, DatabaseZap
        } from 'lucide-react';

        // --- 1. Firebase Configuration Logic ---
        // Check for custom config in localStorage
        const getFirebaseConfig = () => {
            const custom = localStorage.getItem('london_potluck_firebase_config');
            if (custom) {
                try {
                    return JSON.parse(custom);
                } catch (e) {
                    console.error("Invalid custom config", e);
                }
            }
            // Default Fallback
            return {
              apiKey: "AIzaSyAFqiz-m7CGB5c5NmF4Lq_UXm5cKFwJV2I",
              authDomain: "london-potluck.firebaseapp.com",
              projectId: "london-potluck",
              storageBucket: "london-potluck.firebasestorage.app",
              messagingSenderId: "705384101432",
              appId: "1:705384101432:web:a54e5b3e01a17757b098cd"
            };
        };

        let app;
        let db;
        let auth;
        
        try {
            const config = getFirebaseConfig();
            app = initializeApp(config);
            db = getFirestore(app);
            auth = getAuth(app);
            // Attempt Anonymous Login to fix permission issues
            signInAnonymously(auth).catch((error) => {
                console.warn("Auth failed:", error.message);
            });
        } catch(e) {
            console.error("Firebase init failed:", e);
        }

        // --- 2. Design Tokens & Data ---

        const THEME = {
          bg: 'bg-[#FFFBF0]',
          yellow: 'bg-[#FFD93D]',
          blue: 'bg-[#4D96FF]',
          green: 'bg-[#6BCB77]',
          orange: 'bg-[#FF6B6B]',
          purple: 'bg-[#A688FA]', // New color for Forum
          dark: 'bg-[#2D2D2D]',
          border: 'border-[#2D2D2D]',
          shadow: 'shadow-[4px_4px_0px_0px_rgba(45,45,45,1)]',
          shadowHover: 'shadow-[6px_6px_0px_0px_rgba(45,45,45,1)]',
          shadowActive: 'shadow-none translate-y-1',
        };

        const CATEGORIES = [
          { id: 'food', label: 'Food', emoji: '🍩', color: THEME.orange, textColor: 'text-red-900', desc: 'Taste the authentic flavors' },
          { id: 'festival', label: 'Festivals', emoji: '🎈', color: THEME.yellow, textColor: 'text-yellow-900', desc: 'Join the celebration' },
          { id: 'lifestyle', label: 'Lifestyle', emoji: '🚲', color: THEME.green, textColor: 'text-green-900', desc: 'Live like a local' },
          { id: 'religion', label: 'Religion', emoji: '🕌', color: THEME.blue, textColor: 'text-blue-900', desc: 'Find spiritual peace' },
        ];

        // NEW: Forum Categories
        const FORUM_CATEGORIES = [
          { id: 'ask', label: 'Ask London', emoji: '🙋', color: 'bg-[#4D96FF]', desc: 'Questions & Help' },
          { id: 'tips', label: 'Pro Tips', emoji: '💡', color: 'bg-[#FFD93D]', desc: 'Guides & Hacks' },
          { id: 'chat', label: 'Chill Chat', emoji: '☕️', color: 'bg-[#6BCB77]', desc: 'Social & Meetups' },
          { id: 'rant', label: 'Hot Takes', emoji: '🔥', color: 'bg-[#FF6B6B]', desc: 'Rants & Opinions' },
        ];

        const CULTURES = [
          "UK Local", "China", "Korea", "Japan", "Southeast Asia", 
          "India", "Pakistan", "Italy", "France", "Rest of Europe", 
          "Middle East", "Africa", "USA", "Jamaica", "Mixed Heritage", "Others"
        ];

        const LONDON_CENTER = [51.505, -0.09];

        const MOCK_TRACES = [
          { id: 'm1', actionTitle: "Buy Sichuan Peppercorns", locationName: "Hackney Chinese Supermarket", description: "The smell here reminds me of Chengdu. Make sure to buy the red bag!", category: "food", culture: "China", lat: 51.545, lng: -0.055, createdAt: { seconds: 1700000000 }, tags: "#Spicy #Home" },
          { id: 'm2', actionTitle: "Sunday Flower Market Walk", locationName: "Columbia Road", description: "Get there by 8am to avoid crowds. The shouting traders are the best part.", category: "lifestyle", culture: "UK Local", lat: 51.528, lng: -0.07, createdAt: { seconds: 1700003000 }, tags: "#Sunday #Flowers" },
        ];

        const MOCK_FORUM_POSTS = [
            { id: 'fp1', title: "Best Sunday Roast in East London?", content: "I've tried a few places in Shoreditch but looking for something more traditional. Any hidden gems?", category: 'ask', likes: 12, author: "LondonEats", createdAt: { seconds: Date.now()/1000 } },
            { id: 'fp2', title: "Avoid the tube at 5pm!", content: "Central line is absolute chaos today. Just walk if you can.", category: 'tips', likes: 45, author: "CommuterLife", createdAt: { seconds: Date.now()/1000 - 86400 } },
            { id: 'fp3', title: "Anyone up for a coffee in Hyde Park?", content: "It's sunny today! I'll be near the Serpentine around 2pm.", category: 'chat', likes: 3, author: "SunnyDay", createdAt: { seconds: Date.now()/1000 - 172800 } },
        ];

        // --- 3. Optimized Leaflet Map Component ---
        const LeafletMap = ({ markers = [], onMarkerClick, pickingMode = false, onLocationSelect, mapCenter }) => {
          const mapContainerRef = useRef(null);
          const mapInstanceRef = useRef(null);
          const markersGroupRef = useRef(null);
          const pickerMarkerRef = useRef(null);
          const [isMapReady, setIsMapReady] = useState(false);

          useEffect(() => {
            if (mapInstanceRef.current || !mapContainerRef.current || !window.L) return;
            initMap();
            return () => {
              if (mapInstanceRef.current) {
                mapInstanceRef.current.remove();
                mapInstanceRef.current = null;
                setIsMapReady(false);
              }
            };
          }, []);

          const initMap = () => {
            if (!mapContainerRef.current) return;
            if (!window.L || typeof window.L.map !== 'function') {
                console.error("Leaflet not loaded correctly.");
                return;
            }

            const map = L.map(mapContainerRef.current, {
              center: mapCenter || LONDON_CENTER,
              zoom: 13,
              zoomControl: false,
              attributionControl: false
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
              maxZoom: 20,
              subdomains: 'abcd'
            }).addTo(map);

            markersGroupRef.current = L.layerGroup().addTo(map);
            mapInstanceRef.current = map;

            if (pickingMode) {
              map.on('click', (e) => {
                const { lat, lng } = e.latlng;
                updatePickerMarker(lat, lng);
                if (onLocationSelect) onLocationSelect({ lat, lng });
              });
            }

            setTimeout(() => {
              map.invalidateSize();
              setIsMapReady(true);
            }, 200);
          };

          useEffect(() => {
            if (!isMapReady || !mapInstanceRef.current || !window.L || !markersGroupRef.current) return;
            
            if (pickingMode) {
                markersGroupRef.current.clearLayers();
                return;
            }

            markersGroupRef.current.clearLayers();

            markers.forEach(post => {
              const lat = parseFloat(post.lat);
              const lng = parseFloat(post.lng);
              
              if (isNaN(lat) || isNaN(lng)) return;

              const cat = CATEGORIES.find(c => c.id === post.category) || CATEGORIES[0];

              const iconHtml = `
                <div class="relative group" style="transform: translateY(-5px); cursor: pointer;">
                   <div class="w-10 h-10 bg-white border-[3px] border-[#2D2D2D] rounded-full flex items-center justify-center text-xl shadow-[2px_2px_0px_0px_rgba(45,45,45,1)] relative z-10 transition-transform hover:scale-110">
                      ${cat.emoji}
                   </div>
                   <div class="absolute -bottom-1 left-1/2 transform -translate-x-1/2 w-1 h-3 bg-[#2D2D2D] z-0"></div>
                </div>
              `;

              const icon = L.divIcon({
                className: 'custom-pin-marker',
                html: iconHtml,
                iconSize: [40, 50],
                iconAnchor: [20, 50],
                popupAnchor: [0, -50],
                tooltipAnchor: [20, -45]
              });

              const marker = L.marker([lat, lng], { icon });

              marker.bindTooltip(
                `<div class="font-black text-[#2D2D2D] text-sm whitespace-nowrap">${post.actionTitle}</div>`,
                {
                  direction: 'top',
                  offset: [0, -10],
                  opacity: 1,
                  className: 'custom-leaflet-tooltip'
                }
              );

              marker.on('click', () => {
                if (onMarkerClick) onMarkerClick(post);
              });

              markersGroupRef.current.addLayer(marker);
            });
          }, [markers, pickingMode, isMapReady]);

          useEffect(() => {
            if (mapInstanceRef.current && mapCenter && isMapReady) {
              mapInstanceRef.current.setView(mapCenter, 15, { animate: true });
              if (pickingMode) {
                updatePickerMarker(mapCenter[0], mapCenter[1]);
              }
            }
            if (mapInstanceRef.current) {
                setTimeout(() => mapInstanceRef.current.invalidateSize(), 100);
            }
          }, [mapCenter, pickingMode, isMapReady]);

          const updatePickerMarker = (lat, lng) => {
            if (!mapInstanceRef.current || !window.L) return;
            const pinSvg = `
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(2px 2px 0px rgba(0,0,0,1));">
                <path d="M20 0C11.1634 0 4 7.16344 4 16C4 26 20 40 20 40C20 40 36 26 36 16C36 7.16344 28.8366 0 20 0Z" fill="#FFD93D" stroke="#2D2D2D" stroke-width="2"/>
                <circle cx="20" cy="16" r="6" fill="#2D2D2D"/>
              </svg>
            `;
            if (pickerMarkerRef.current) {
              pickerMarkerRef.current.setLatLng([lat, lng]);
            } else {
              const icon = L.divIcon({
                className: 'picker-icon',
                html: pinSvg,
                iconSize: [40, 40],
                iconAnchor: [20, 40]
              });
              pickerMarkerRef.current = L.marker([lat, lng], { icon, draggable: false }).addTo(mapInstanceRef.current);
            }
          };

          return (
            <div className={`w-full h-full relative isolate ${pickingMode ? 'rounded-3xl border-2 border-[#2D2D2D] overflow-hidden' : ''}`}>
               <div 
                 ref={mapContainerRef} 
                 className="w-full h-full min-h-[300px] z-0" 
                 style={{ width: '100%', height: '100%', outline: 'none' }}
               />
               <style>{`
                 .custom-leaflet-tooltip {
                   background-color: #FFFBF0 !important;
                   border: 2px solid #2D2D2D !important;
                   border-radius: 8px !important;
                   padding: 6px 12px !important;
                   box-shadow: 4px 4px 0px 0px rgba(45,45,45,1) !important;
                   color: #2D2D2D !important;
                   font-family: 'Nunito', sans-serif !important;
                   font-weight: 800 !important;
                   font-size: 14px !important;
                 }
                 .leaflet-tooltip-top:before {
                   border-top-color: #2D2D2D !important;
                 }
               `}</style>
            </div>
          );
        };

        // --- 4. Components ---

        // 4.x Splash Screen (NEW)
        const SplashScreen = ({ onFinish }) => {
            useEffect(() => {
                const timer = setTimeout(() => {
                    onFinish();
                }, 3000); // 3 seconds total (2.2s visible + 0.8s fade)
                return () => clearTimeout(timer);
            }, [onFinish]);

            return (
                <div className="fixed inset-0 z-[9999] bg-[#FFFBF0] flex flex-col items-center justify-center animate-fade-out pointer-events-none">
                    <div className="flex gap-4 mb-6">
                        <div className="text-6xl animate-bounce-1">🍩</div>
                        <div className="text-6xl animate-bounce-2">🎈</div>
                        <div className="text-6xl animate-bounce-3">🚲</div>
                        <div className="text-6xl animate-bounce-4">🕌</div>
                    </div>
                    <h1 className="text-4xl font-black text-[#2D2D2D] tracking-tight mb-2" style={{ fontFamily: '"Nunito", sans-serif' }}>
                        London <span className="text-orange-500">Potluck</span>
                    </h1>
                    <p className="text-[#2D2D2D] font-bold text-lg animate-pulse">Gathering the vibes...</p>
                </div>
            );
        };

        const PostDetailModal = ({ post, onClose, isSaved, onToggleSave }) => {
          if (!post) return null;
          const cat = CATEGORIES.find(c => c.id === post.category) || CATEGORIES[0];

          return (
            <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center pointer-events-none">
              <div className="absolute inset-0 bg-[#2D2D2D]/60 backdrop-blur-sm pointer-events-auto transition-opacity" onClick={onClose}></div>
              <div className="bg-[#FFFBF0] w-full md:w-[500px] md:rounded-[32px] rounded-t-[32px] shadow-2xl overflow-hidden pointer-events-auto flex flex-col max-h-[90vh] animate-slide-up border-t-4 md:border-4 border-[#2D2D2D]">
                <div className={`h-40 ${cat.color} relative flex items-center justify-center border-b-4 border-[#2D2D2D]`}>
                  <div className="bg-white w-24 h-24 rounded-full border-4 border-[#2D2D2D] flex items-center justify-center text-5xl shadow-[4px_4px_0px_0px_rgba(0,0,0,0.2)]">
                    {cat.emoji}
                  </div>
                  <button onClick={onClose} className="absolute top-4 right-4 bg-white hover:bg-red-100 p-2 rounded-full border-2 border-[#2D2D2D] transition-colors shadow-[2px_2px_0px_0px_rgba(45,45,45,1)] active:translate-y-0.5 active:shadow-none">
                    <X size={24} className="text-[#2D2D2D]" />
                  </button>
                </div>
                <div className="p-8 overflow-y-auto">
                  <div className="flex gap-2 mb-4">
                     <span className="px-4 py-1.5 bg-[#2D2D2D] text-white text-xs font-bold rounded-full uppercase tracking-wider shadow-sm">{post.culture}</span>
                     <span className="px-4 py-1.5 bg-white border-2 border-[#2D2D2D] text-[#2D2D2D] text-xs font-black rounded-full uppercase tracking-wider">{cat.label}</span>
                  </div>
                  <div className="flex justify-between items-start mb-4">
                    <h2 className="text-3xl font-black text-[#2D2D2D] leading-tight flex-1 mr-4">{post.actionTitle}</h2>
                    <button onClick={() => onToggleSave(post)} className="text-gray-300 hover:scale-110 transition-transform">
                      <Star size={32} fill={isSaved ? "#FFD93D" : "none"} strokeWidth={2.5} className={isSaved ? "text-[#2D2D2D]" : "text-[#2D2D2D]"} />
                    </button>
                  </div>
                  <div className="flex items-center text-gray-500 font-bold text-sm mb-6 bg-white/50 p-2 rounded-xl w-fit">
                      <MapPin size={18} className="mr-2 text-red-500" />
                      {post.locationName}
                  </div>
                  <div className="bg-white p-6 rounded-3xl border-2 border-[#2D2D2D] shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] mb-8">
                    <h3 className="text-sm font-black text-gray-400 uppercase mb-3 flex items-center gap-2">
                      <User size={16} /> Guide's Note
                    </h3>
                    <p className="text-lg text-[#2D2D2D] font-bold leading-relaxed">"{post.description}"</p>
                  </div>
                  <button 
                    onClick={() => { onToggleSave(post); onClose(); }}
                    className={`w-full py-4 text-white rounded-2xl font-black text-xl flex items-center justify-center gap-3 border-2 border-[#2D2D2D] transition-all group ${isSaved ? 'bg-gray-400 cursor-default' : 'bg-[#2D2D2D] shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] hover:-translate-y-1 hover:shadow-[6px_6px_0px_0px_rgba(45,45,45,1)] active:translate-y-0 active:shadow-none'}`}
                  >
                    {isSaved ? (
                      <><span>✅</span> Added to Collection!</>
                    ) : (
                      <><span>🚀</span> Accept Mission & Explore!</>
                    )}
                  </button>
                </div>
              </div>
            </div>
          );
        };

        const EditPostModal = ({ post, onClose, onSave }) => {
          const [formData, setFormData] = useState({
            actionTitle: post.actionTitle,
            description: post.description,
            category: post.category
          });

          const handleSave = () => {
            onSave(post.id, formData);
          };

          return (
            <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-fade-in">
              <div className="bg-[#FFFBF0] w-full max-w-md rounded-[32px] border-4 border-[#2D2D2D] shadow-2xl p-6 relative animate-bounce-in">
                <button onClick={onClose} className="absolute top-4 right-4 p-2 hover:bg-gray-100 rounded-full">
                  <X size={24} className="text-[#2D2D2D]" />
                </button>
                <h2 className="text-2xl font-black text-[#2D2D2D] mb-6 flex items-center gap-2">
                  <Edit3 size={24}/> Edit Your Gem
                </h2>
                <div className="space-y-4">
                  <div>
                    <label className="text-xs font-bold uppercase text-gray-500 mb-1 block">Title</label>
                    <input 
                      value={formData.actionTitle} 
                      onChange={e => setFormData({...formData, actionTitle: e.target.value})}
                      className="w-full p-3 border-2 border-[#2D2D2D] rounded-xl font-bold bg-white"
                    />
                  </div>
                  <div>
                    <label className="text-xs font-bold uppercase text-gray-500 mb-1 block">Description</label>
                    <textarea 
                      value={formData.description} 
                      onChange={e => setFormData({...formData, description: e.target.value})}
                      className="w-full h-32 p-3 border-2 border-[#2D2D2D] rounded-xl font-medium bg-white resize-none"
                    />
                  </div>
                  <div>
                     <label className="text-xs font-bold uppercase text-gray-500 mb-1 block">Category</label>
                     <div className="flex gap-2">
                       {CATEGORIES.map(cat => (
                         <button 
                           key={cat.id}
                           onClick={() => setFormData({...formData, category: cat.id})}
                           className={`w-10 h-10 rounded-full border-2 border-[#2D2D2D] flex items-center justify-center text-xl transition-all ${formData.category === cat.id ? `${cat.color} scale-110 shadow-sm` : 'bg-white opacity-50'}`}
                         >
                           {cat.emoji}
                         </button>
                       ))}
                     </div>
                  </div>
                </div>
                <button 
                  onClick={handleSave}
                  className="w-full mt-6 py-3 bg-[#2D2D2D] text-white font-black text-lg rounded-2xl flex items-center justify-center gap-2 shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] hover:-translate-y-1 active:translate-y-0 active:shadow-none transition-all"
                >
                  <Save size={20} /> Save Changes
                </button>
              </div>
            </div>
          );
        };

        // --- NEW: Forum Components ---

        // NEW: Database Config Modal
        const DBConfigModal = ({ onClose }) => {
            const [configStr, setConfigStr] = useState('');
            
            useEffect(() => {
                const current = localStorage.getItem('london_potluck_firebase_config');
                if (current) setConfigStr(current);
            }, []);

            const handleSave = () => {
                if (!configStr.trim()) {
                    localStorage.removeItem('london_potluck_firebase_config');
                    alert("Reset to default demo database. Reload to apply.");
                    window.location.reload();
                    return;
                }
                try {
                    const parsed = JSON.parse(configStr);
                    if (!parsed.apiKey || !parsed.projectId) throw new Error("Invalid config");
                    localStorage.setItem('london_potluck_firebase_config', configStr);
                    alert("Config saved! Reloading...");
                    window.location.reload();
                } catch (e) {
                    alert("Invalid JSON format. Please copy the full config object from Firebase Console.");
                }
            };

            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-fade-in">
                    <div className="bg-[#FFFBF0] w-full max-w-lg rounded-[32px] border-4 border-[#2D2D2D] shadow-2xl p-6 relative">
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 hover:bg-gray-200 rounded-full"><X size={24}/></button>
                        <h2 className="text-2xl font-black text-[#2D2D2D] mb-4 flex items-center gap-2">
                            <DatabaseZap size={28} className="text-yellow-500" /> Connect Your DB
                        </h2>
                        <p className="text-sm font-bold text-gray-500 mb-4">
                            The default database is strictly read-only for security. To enable posting and interactions, create a FREE project at <a href="https://console.firebase.google.com" target="_blank" className="text-blue-500 underline">firebase.google.com</a> and paste your config JSON here.
                        </p>
                        <textarea 
                            value={configStr}
                            onChange={e => setConfigStr(e.target.value)}
                            placeholder='{"apiKey": "...", "authDomain": "...", ...}'
                            className="w-full h-48 p-4 font-mono text-xs border-2 border-[#2D2D2D] rounded-xl bg-white mb-4"
                        />
                        <button onClick={handleSave} className="w-full py-3 bg-[#2D2D2D] text-white font-black rounded-xl hover:bg-black transition-all">
                            Save & Reload
                        </button>
                        <button onClick={() => { localStorage.removeItem('london_potluck_firebase_config'); window.location.reload(); }} className="w-full mt-2 py-2 text-red-500 font-bold text-xs hover:underline">
                            Reset to Default (Demo Mode)
                        </button>
                    </div>
                </div>
            );
        };

        // NEW: Forum Post Detail Modal with Comments
        const ForumPostDetailModal = ({ post, onClose, currentUserId }) => {
            const [reply, setReply] = useState('');
            const [comments, setComments] = useState([]);
            const [sending, setSending] = useState(false);
            const isMock = !post.id || post.id.startsWith('fp');

            useEffect(() => {
                if (isMock) {
                    // Populate mock comments for demo
                    setComments([
                        {id: 'mc1', author: 'LondonLover', content: 'Totally agree with this! The vibe is amazing.', createdAt: {seconds: Date.now()/1000 - 3600}},
                        {id: 'mc2', author: 'Tourist_99', content: 'Thanks for the tip, adding to my list.', createdAt: {seconds: Date.now()/1000 - 1800}}
                    ]);
                    return;
                }
                const q = query(collection(db, `forum_posts/${post.id}/comments`), orderBy("createdAt", "asc"));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    setComments(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
                }, (error) => {
                    console.error("Comments permission error:", error);
                });
                return () => unsubscribe();
            }, [post.id, isMock]);

            const handleSendReply = async () => {
                if (!reply.trim()) return;
                setSending(true);
                try {
                    await addDoc(collection(db, `forum_posts/${post.id}/comments`), {
                        content: reply,
                        author: "Explorer", 
                        createdAt: serverTimestamp()
                    });
                    setReply('');
                } catch (e) {
                    console.error(e);
                    alert("Posting failed. Please check your database rules allow writing to 'forum_posts'.");
                } finally {
                    setSending(false);
                }
            };

            const cat = FORUM_CATEGORIES.find(c => c.id === post.category) || FORUM_CATEGORIES[0];

            return (
                <div className="fixed inset-0 z-[130] flex items-end md:items-center justify-center pointer-events-none">
                    <div className="absolute inset-0 bg-[#2D2D2D]/60 backdrop-blur-sm pointer-events-auto" onClick={onClose}></div>
                    <div className="bg-[#FFFBF0] w-full md:w-[600px] md:h-[80vh] h-[90vh] md:rounded-[32px] rounded-t-[32px] shadow-2xl overflow-hidden pointer-events-auto flex flex-col border-t-4 md:border-4 border-[#2D2D2D] animate-slide-up">
                        
                        {/* Header */}
                        <div className="p-6 border-b-2 border-[#2D2D2D] bg-white flex justify-between items-start">
                            <div>
                                <div className={`inline-flex items-center gap-2 px-3 py-1 rounded-full border border-[#2D2D2D] text-xs font-black uppercase ${cat.color} mb-3`}>
                                    {cat.emoji} {cat.label}
                                </div>
                                <h2 className="text-2xl font-black text-[#2D2D2D] leading-tight">{post.title}</h2>
                                <div className="flex items-center gap-2 mt-2">
                                    <div className="w-6 h-6 rounded-full bg-gray-200 border border-[#2D2D2D] flex items-center justify-center text-[10px] font-bold">{post.author ? post.author[0] : '?'}</div>
                                    <span className="text-xs font-bold text-gray-400">{post.author} • {post.createdAt && typeof post.createdAt.seconds === 'number' ? new Date(post.createdAt.seconds * 1000).toLocaleDateString() : 'Just now'}</span>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full border border-transparent hover:border-[#2D2D2D] transition-all">
                                <X size={24}/>
                            </button>
                        </div>

                        {/* Body & Comments */}
                        <div className="flex-1 overflow-y-auto p-6 bg-[#FFFBF0]">
                            {isMock && (
                                <div className="bg-yellow-100 border-2 border-yellow-400 text-yellow-800 p-3 rounded-xl text-xs font-black mb-4 text-center">
                                    🚧 Demo Mode: This is a sample post. Comments are simulated.
                                </div>
                            )}
                            <p className="text-lg font-bold text-[#2D2D2D] leading-relaxed whitespace-pre-wrap mb-8">
                                {post.content}
                            </p>

                            <div className="border-t-2 border-dashed border-[#2D2D2D]/20 pt-6">
                                <h3 className="font-black text-gray-400 uppercase text-sm mb-4">Discussion ({comments.length})</h3>
                                {comments.length === 0 ? (
                                    <div className="text-center py-8 text-gray-400 font-bold italic">No replies yet. Start the conversation! 👇</div>
                                ) : (
                                    <div className="space-y-4">
                                        {comments.map(comment => (
                                            <div key={comment.id} className="bg-white p-3 rounded-xl border border-[#2D2D2D] shadow-sm">
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-xs font-black text-purple-600">{comment.author}</span>
                                                    <span className="text-[10px] text-gray-400">{comment.createdAt ? new Date(comment.createdAt.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now'}</span>
                                                </div>
                                                <p className="text-sm font-bold text-[#2D2D2D]">{comment.content}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Footer Input */}
                        <div className="p-4 bg-white border-t-2 border-[#2D2D2D] flex gap-2 items-end">
                            <textarea 
                                value={reply}
                                onChange={e => setReply(e.target.value)}
                                placeholder={isMock ? "Comments disabled for demo posts" : "Add your two cents..."}
                                disabled={isMock}
                                className="flex-1 p-3 bg-gray-50 border-2 border-[#2D2D2D] rounded-xl font-bold text-sm resize-none focus:outline-none focus:ring-2 focus:ring-purple-200 disabled:opacity-50 disabled:cursor-not-allowed"
                                rows={1}
                            />
                            <button 
                                onClick={handleSendReply}
                                disabled={sending || !reply.trim() || isMock}
                                className="p-3 bg-[#2D2D2D] text-white rounded-xl hover:scale-105 active:scale-95 transition-transform disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <Send size={20} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const CreateForumPostModal = ({ onClose }) => {
            const [title, setTitle] = useState('');
            const [content, setContent] = useState('');
            const [category, setCategory] = useState(FORUM_CATEGORIES[0].id);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async () => {
                if (!title.trim() || !content.trim()) return;
                setLoading(true);
                try {
                    await addDoc(collection(db, "forum_posts"), {
                        title,
                        content,
                        category,
                        createdAt: serverTimestamp(),
                        likes: 0,
                        author: "Explorer"
                    });
                    onClose();
                } catch (e) {
                    console.error("Posting error:", e);
                    alert("Failed to post. If you are the owner, please update your Firestore Security Rules to allow writes to 'forum_posts'.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-[#FFFBF0] w-full max-w-lg rounded-[32px] border-4 border-[#2D2D2D] shadow-2xl p-6 relative animate-slide-up">
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 hover:bg-gray-200 rounded-full border-2 border-transparent hover:border-[#2D2D2D] transition-all">
                            <X size={24} className="text-[#2D2D2D]" />
                        </button>
                        
                        <h2 className="text-3xl font-black text-[#2D2D2D] mb-6 flex items-center gap-3">
                            <MessageSquare className="text-purple-500 fill-purple-500" size={32} />
                            Start a Discussion
                        </h2>

                        <div className="space-y-5">
                            <div>
                                <label className="text-xs font-black uppercase text-gray-500 mb-2 block">Choose Topic Vibe</label>
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                                    {FORUM_CATEGORIES.map(cat => (
                                        <button 
                                            key={cat.id}
                                            onClick={() => setCategory(cat.id)}
                                            className={`py-3 px-2 rounded-xl border-2 font-bold text-xs flex flex-col items-center gap-1 transition-all ${category === cat.id ? `${cat.color} border-[#2D2D2D] text-[#2D2D2D] shadow-[2px_2px_0px_0px_rgba(45,45,45,1)] -translate-y-1` : 'bg-white border-gray-200 text-gray-400 hover:border-gray-300'}`}
                                        >
                                            <span className="text-xl">{cat.emoji}</span>
                                            {cat.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="text-xs font-black uppercase text-gray-500 mb-2 block">Title</label>
                                <input 
                                    value={title}
                                    onChange={e => setTitle(e.target.value)}
                                    placeholder="What's on your mind?"
                                    className="w-full p-4 border-2 border-[#2D2D2D] rounded-2xl font-bold bg-white focus:outline-none focus:ring-4 focus:ring-purple-200"
                                />
                            </div>

                            <div>
                                <label className="text-xs font-black uppercase text-gray-500 mb-2 block">Your Thoughts</label>
                                <textarea 
                                    value={content}
                                    onChange={e => setContent(e.target.value)}
                                    placeholder="Share your experience, ask for advice, or rant away..."
                                    className="w-full h-32 p-4 border-2 border-[#2D2D2D] rounded-2xl font-medium bg-white resize-none focus:outline-none focus:ring-4 focus:ring-purple-200"
                                />
                            </div>
                        </div>

                        <button 
                            onClick={handleSubmit}
                            disabled={loading}
                            className="w-full mt-8 py-4 bg-[#2D2D2D] text-white font-black text-xl rounded-2xl shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] hover:-translate-y-1 hover:shadow-[6px_6px_0px_0px_rgba(45,45,45,1)] active:translate-y-0 active:shadow-none transition-all flex items-center justify-center gap-2 disabled:opacity-70"
                        >
                           {loading ? 'Posting...' : <><Send size={20}/> Post to Forum</>} 
                        </button>
                    </div>
                </div>
            );
        };

        const ForumView = ({ onOpenPost }) => {
            const [posts, setPosts] = useState([]);
            const [filter, setFilter] = useState('all');
            const [isCreateOpen, setIsCreateOpen] = useState(false);

            useEffect(() => {
                const q = query(collection(db, "forum_posts"), orderBy("createdAt", "desc"));
                // Added error handling to onSnapshot to catch permission-denied errors
                const unsubscribe = onSnapshot(q, 
                    (snapshot) => {
                        const fetchedPosts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setPosts(fetchedPosts.length > 0 ? fetchedPosts : MOCK_FORUM_POSTS);
                    },
                    (error) => {
                        console.error("Forum listener error (likely permissions):", error);
                        // Fallback to mock data if backend fails
                        setPosts(MOCK_FORUM_POSTS);
                    }
                );
                return () => unsubscribe();
            }, []);

            const handleLike = async (e, id) => {
                e.stopPropagation(); // Prevent opening modal
                if (id.startsWith('fp')) return; // Don't like mock posts
                try {
                    const postRef = doc(db, "forum_posts", id);
                    await updateDoc(postRef, { likes: increment(1) });
                } catch (e) {
                    // console.error("Like failed", e);
                }
            };

            const filteredPosts = filter === 'all' ? posts : posts.filter(p => p.category === filter);

            return (
                <div className="flex flex-col h-full bg-[#FFFBF0] pt-4 max-w-4xl mx-auto w-full relative">
                    <header className="px-6 mb-6">
                        <div className="flex justify-between items-center mb-4">
                             <div>
                                <h1 className="text-4xl font-black text-[#2D2D2D]">Community <span className="text-purple-500">Voices</span></h1>
                                <p className="font-bold text-gray-400 text-sm">Real talk from real Londoners.</p>
                             </div>
                             <div className="bg-white p-2 rounded-2xl border-2 border-[#2D2D2D] shadow-[3px_3px_0px_0px_rgba(45,45,45,1)]">
                                <MessageCircle size={32} className="text-purple-500 fill-purple-200" strokeWidth={2.5}/>
                             </div>
                        </div>

                        {/* Categories */}
                        <div className="flex gap-3 overflow-x-auto pb-4 scrollbar-hide">
                             <button 
                                onClick={() => setFilter('all')}
                                className={`px-5 py-2.5 rounded-full border-2 font-black whitespace-nowrap text-sm transition-all ${filter === 'all' ? 'bg-[#2D2D2D] text-white shadow-[2px_2px_0px_0px_rgba(45,45,45,1)]' : 'bg-white border-[#2D2D2D] text-[#2D2D2D] hover:bg-gray-100'}`}
                             >
                                All Topics
                             </button>
                             {FORUM_CATEGORIES.map(cat => (
                                 <button 
                                    key={cat.id}
                                    onClick={() => setFilter(cat.id)}
                                    className={`px-5 py-2.5 rounded-full border-2 font-black whitespace-nowrap text-sm flex items-center gap-2 transition-all ${filter === cat.id ? `${cat.color} border-[#2D2D2D] text-[#2D2D2D] shadow-[2px_2px_0px_0px_rgba(45,45,45,1)]` : 'bg-white border-gray-200 text-gray-400 hover:border-[#2D2D2D] hover:text-[#2D2D2D]'}`}
                                 >
                                    <span>{cat.emoji}</span> {cat.label}
                                 </button>
                             ))}
                        </div>
                    </header>

                    {/* Posts List */}
                    <div className="flex-1 overflow-y-auto px-6 pb-24 space-y-6">
                        {filteredPosts.length === 0 ? (
                             <div className="flex flex-col items-center justify-center py-20 text-gray-300">
                                 <MessageSquare size={64} className="mb-4 stroke-1"/>
                                 <p className="font-bold text-lg">No conversations yet.</p>
                                 <p className="font-bold text-sm">Be the first to say something!</p>
                             </div>
                        ) : (
                            filteredPosts.map(post => {
                                const cat = FORUM_CATEGORIES.find(c => c.id === post.category) || FORUM_CATEGORIES[0];
                                return (
                                    <div 
                                        key={post.id} 
                                        onClick={() => onOpenPost(post)}
                                        className="bg-white border-2 border-[#2D2D2D] rounded-3xl p-5 shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] hover:-translate-y-1 hover:shadow-[6px_6px_0px_0px_rgba(45,45,45,1)] transition-all cursor-pointer group"
                                    >
                                        <div className="flex justify-between items-start mb-3">
                                            <div className="flex items-center gap-2">
                                                <div className="w-8 h-8 rounded-full bg-gray-100 border border-[#2D2D2D] flex items-center justify-center text-xs font-black">
                                                    {post.author ? post.author[0] : '?'}
                                                </div>
                                                <span className="text-xs font-bold text-gray-500">{post.author}</span>
                                            </div>
                                            <span className={`px-3 py-1 rounded-lg border border-[#2D2D2D] text-[10px] font-black uppercase ${cat.color}`}>
                                                {cat.emoji} {cat.label}
                                            </span>
                                        </div>
                                        
                                        <h3 className="text-xl font-black text-[#2D2D2D] leading-tight mb-2 group-hover:text-purple-600 transition-colors">{post.title}</h3>
                                        <p className="text-gray-600 font-bold text-sm leading-relaxed mb-4 whitespace-pre-wrap line-clamp-3">{post.content}</p>
                                        
                                        <div className="flex items-center justify-between border-t-2 border-dashed border-gray-100 pt-3">
                                            <span className="text-xs font-bold text-gray-300">
                                                {post.createdAt && typeof post.createdAt.seconds === 'number' ? new Date(post.createdAt.seconds * 1000).toLocaleDateString() : 'Just now'}
                                            </span>
                                            <button 
                                                onClick={(e) => handleLike(e, post.id)}
                                                className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl hover:bg-red-50 text-gray-400 hover:text-red-500 transition-colors"
                                            >
                                                <Heart size={18} className="hover:fill-red-500 transition-colors" />
                                                <span className="font-black text-sm">{post.likes || 0}</span>
                                            </button>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>

                    {/* Create Post FAB */}
                    <button 
                        onClick={() => setIsCreateOpen(true)}
                        className="fixed bottom-24 right-6 bg-[#2D2D2D] text-white p-4 rounded-full border-2 border-[#2D2D2D] shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] hover:bg-black hover:scale-110 hover:rotate-90 transition-all z-30"
                    >
                        <PlusCircle size={32} />
                    </button>

                    {isCreateOpen && <CreateForumPostModal onClose={() => setIsCreateOpen(false)} />}
                </div>
            );
        };

        const HomeFlow = ({ traces, onOpenDetail, savedPosts, toggleSave }) => {
          return (
            <div className="flex flex-col h-full relative overflow-hidden px-4 md:px-0 max-w-2xl mx-auto w-full">
              <header className="pt-8 pb-4 px-4 md:px-8 z-10 sticky top-0 bg-[#FFFBF0]/95 backdrop-blur flex justify-between items-center">
                <div>
                  <h1 className="text-4xl font-black text-[#2D2D2D] tracking-tight" style={{ fontFamily: '"Nunito", sans-serif' }}>
                    London <span className="text-orange-500">Potluck</span>
                  </h1>
                  <p className="text-sm font-bold text-gray-400 tracking-wider mt-1">☀️ Sunday Mode: ON</p>
                </div>
                <div className="bg-white p-3 rounded-full border-2 border-[#2D2D2D] shadow-[2px_2px_0px_0px_rgba(45,45,45,1)]">
                  <Smile className="text-yellow-500 w-8 h-8" strokeWidth={2.5} />
                </div>
              </header>
              <div className="flex-1 overflow-y-auto px-4 md:px-8 pb-48 pt-4 scrollbar-hide">
                {traces.map((trace, index) => {
                  const cat = CATEGORIES.find(c => c.id === trace.category) || CATEGORIES[0];
                  const isSaved = savedPosts.includes(trace.id);
                  return (
                    <div 
                      key={trace.id}
                      className="mb-6 group"
                      style={{ animation: `fade-in-up 0.5s ease-out forwards`, animationDelay: `${index * 0.1}s` }}
                    >
                      <div 
                        onClick={() => onOpenDetail(trace)}
                        className={`bg-white border-2 border-[#2D2D2D] rounded-3xl p-5 transition-all cursor-pointer relative ${THEME.shadow} hover:${THEME.shadowHover} hover:-translate-y-1`}
                      >
                        <div className="flex justify-between items-start mb-3">
                          <div className="flex items-center gap-2">
                             <span className={`px-3 py-1 rounded-full text-xs font-black border border-[#2D2D2D] ${cat.color} text-[#2D2D2D]`}>{cat.label}</span>
                             <span className="text-xs font-bold text-gray-400 uppercase tracking-wider">{trace.culture}</span>
                          </div>
                          <button 
                            onClick={(e) => { e.stopPropagation(); toggleSave(trace.id); }}
                            className="p-1 hover:bg-gray-100 rounded-full transition-transform hover:scale-110"
                          >
                            <Star size={20} fill={isSaved ? "#FFD93D" : "none"} className="text-[#2D2D2D]" strokeWidth={2.5} />
                          </button>
                        </div>
                        <div className="flex gap-4">
                          <div className="text-5xl filter drop-shadow-sm transform group-hover:rotate-12 transition-transform duration-300">
                            {cat.emoji}
                          </div>
                          <div>
                            <h3 className="text-xl font-black text-[#2D2D2D] leading-tight mb-2">{trace.actionTitle}</h3>
                            <p className="text-sm text-gray-600 font-bold line-clamp-2 mb-3 bg-gray-50 p-2 rounded-lg">
                              {trace.description || "A new gem has been added to the map."}
                            </p>
                            <div className="flex items-center text-xs font-black text-gray-400">
                              <MapPin size={14} className="mr-1 text-red-500" /> {trace.locationName}
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
                <div className="h-24 flex items-center justify-center text-gray-400 font-bold text-sm italic">
                   More gems coming soon... 💎
                </div>
              </div>
            </div>
          );
        };

        const ExploreWizard = ({ posts, onClose, onFinish }) => {
          const [stage, setStage] = useState('culture'); 
          const [selectedCulture, setSelectedCulture] = useState(null);
          const [mission, setMission] = useState(null);

          const handleCultureSelect = (c) => {
            setSelectedCulture(c);
            setStage('category');
          };

          const handleCategorySelect = (catId) => {
            const matches = posts.filter(p => 
              (p.culture === selectedCulture || selectedCulture === 'Others') && 
              p.category === catId
            );
            
            setTimeout(() => {
              if (matches.length > 0) {
                setMission(matches[Math.floor(Math.random() * matches.length)]);
              } else {
                setMission({
                  id: 'gen',
                  actionTitle: `Explore ${selectedCulture} ${CATEGORIES.find(c=>c.id===catId).label}`,
                  locationName: "London",
                  description: "No specific tip yet. Be the first to discover one!",
                  category: catId,
                  culture: selectedCulture
                });
              }
              setStage('result');
            }, 800); 
          };

          const getMissionCat = () => {
            if (!mission) return CATEGORIES[0];
            return CATEGORIES.find(c => c.id === mission.category) || CATEGORIES[0];
          }

          return (
            <div className="fixed inset-0 z-50 bg-[#FFFBF0] flex flex-col items-center justify-center p-6 animate-fade-in">
              <button onClick={onClose} className="absolute top-6 right-6 p-2 border-2 border-[#2D2D2D] rounded-full hover:bg-red-100 bg-white shadow-[2px_2px_0px_0px_rgba(45,45,45,1)] active:shadow-none active:translate-y-0.5">
                <X size={24} />
              </button>

              {stage === 'culture' && (
                <div className="w-full max-w-lg text-center animate-slide-up">
                  <h2 className="text-4xl font-black text-[#2D2D2D] mb-8">Hey! 👋 <br/>Pick a culture vibe:</h2>
                  <div className="flex flex-wrap justify-center gap-3">
                    {CULTURES.map(c => (
                      <button 
                        key={c} 
                        onClick={() => handleCultureSelect(c)}
                        className="px-6 py-3 bg-white border-2 border-[#2D2D2D] rounded-full font-bold text-lg hover:bg-yellow-300 hover:-translate-y-1 transition-all shadow-[2px_2px_0px_0px_rgba(45,45,45,1)]"
                      >
                        {c}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {stage === 'category' && (
                <div className="w-full max-w-lg text-center animate-slide-up">
                  <h2 className="text-4xl font-black text-[#2D2D2D] mb-8">Nice! <br/>What are you craving?</h2>
                  <div className="grid grid-cols-2 gap-4">
                    {CATEGORIES.map(cat => (
                      <button 
                        key={cat.id} 
                        onClick={() => handleCategorySelect(cat.id)}
                        className={`p-6 bg-white border-2 border-[#2D2D2D] rounded-3xl flex flex-col items-center hover:-translate-y-1 transition-all shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] hover:bg-${cat.color.replace('bg-', '')}/20`}
                      >
                        <span className="text-5xl mb-3">{cat.emoji}</span>
                        <span className="font-black text-xl text-[#2D2D2D]">{cat.label}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {stage === 'result' && mission && (
                <div className="w-full max-w-md text-center animate-bounce-in">
                  <div className="mb-4 font-black text-xl text-gray-400 uppercase tracking-widest">✨ Mission Found ✨</div>
                  <div className="bg-white border-4 border-[#2D2D2D] rounded-[32px] p-8 shadow-[8px_8px_0px_0px_rgba(45,45,45,1)] relative overflow-hidden">
                     <div className={`absolute top-0 left-0 w-full h-6 ${getMissionCat().color} border-b-4 border-[#2D2D2D]`}></div>
                     <div className="mt-4 mb-4 text-6xl">{getMissionCat().emoji}</div>
                     <h3 className="text-3xl font-black text-[#2D2D2D] leading-tight mb-4">{mission.actionTitle}</h3>
                     <div className="inline-block bg-gray-100 px-4 py-2 rounded-xl font-bold text-gray-600 mb-6 border border-gray-300">
                        📍 {mission.locationName}
                     </div>
                     <button 
                       onClick={() => onFinish(mission)}
                       className="w-full py-4 bg-[#2D2D2D] text-white font-black text-xl rounded-2xl shadow-lg hover:bg-black transition-colors group flex items-center justify-center gap-2"
                     >
                       Let's Go! 🚀 
                     </button>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const ShareForm = ({ goBack }) => {
          const [step, setStep] = useState(1);
          const [loading, setLoading] = useState(false);
          const [mapCenter, setMapCenter] = useState(LONDON_CENTER);
          const [formData, setFormData] = useState({
            category: '', culture: '', actionTitle: '', locationName: '', 
            lat: null, lng: null, description: '', tags: ''
          });
          
          const handleSearchLocation = async () => {
            if (!formData.locationName) return;
            try {
              const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${formData.locationName}, London&limit=1`);
              const data = await response.json();
              if (data && data.length > 0) {
                const { lat, lon } = data[0];
                const newLat = parseFloat(lat);
                const newLng = parseFloat(lon);
                setMapCenter([newLat, newLng]);
                setFormData(prev => ({ ...prev, lat: newLat, lng: newLng }));
              }
            } catch (e) { console.error("Geo error", e); }
          };

          const handleMapPin = async (pos) => {
            setFormData(prev => ({ ...prev, lat: pos.lat, lng: pos.lng }));
            try {
              const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.lat}&lon=${pos.lng}`);
              const data = await response.json();
              if (data && data.display_name) {
                const simpleName = data.display_name.split(',').slice(0, 2).join(',');
                setFormData(prev => ({ ...prev, locationName: simpleName }));
              }
            } catch (e) { console.error("Reverse geo error", e); }
          };

          const handleSubmit = async () => {
            setLoading(true);
            try {
              await addDoc(collection(db, "potlucks"), {
                ...formData,
                lat: formData.lat || LONDON_CENTER[0],
                lng: formData.lng || LONDON_CENTER[1],
                createdAt: serverTimestamp(),
              });
              alert("Published! You earned +1 Contribution Point! 🌟");
              goBack();
            } catch (e) { 
                // console.error(e);
                alert("Demo Mode: Posting is currently disabled by server rules.");
            } finally { setLoading(false); }
          };

          return (
            <div className="h-full flex flex-col bg-[#FFFBF0] w-full max-w-3xl mx-auto">
              <div className="flex items-center p-6 pb-2 sticky top-0 z-50 bg-[#FFFBF0]">
                <button onClick={goBack} className="p-3 bg-white border-2 border-[#2D2D2D] rounded-full shadow-[2px_2px_0px_0px_rgba(45,45,45,1)] hover:bg-gray-100 mr-4 active:translate-y-0.5 active:shadow-none transition-all">
                  <ArrowLeft size={24} strokeWidth={3} />
                </button>
                <div className="flex-1 h-4 bg-white rounded-full border-2 border-[#2D2D2D] overflow-hidden">
                  <div className="h-full bg-[#FFD93D] transition-all duration-300 border-r-2 border-[#2D2D2D]" style={{ width: `${(step / 6) * 100}%` }}></div>
                </div>
              </div>
              <div className="flex-1 overflow-y-auto px-6 pb-20">
                <h2 className="text-4xl font-black text-[#2D2D2D] mb-8 mt-2">Share a Gem 💎</h2>
                <div className={step === 1 ? 'block animate-fade-in-up' : 'hidden'}>
                  <h3 className="text-2xl font-black mb-6">1. What's the vibe?</h3>
                  <div className="grid grid-cols-2 gap-4">
                    {CATEGORIES.map(cat => (
                      <button
                        key={cat.id}
                        onClick={() => { setFormData({...formData, category: cat.id}); setStep(2); }}
                        className="p-6 border-2 border-[#2D2D2D] rounded-3xl flex flex-col items-center bg-white hover:-translate-y-1 hover:shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] transition-all"
                      >
                        <span className="text-5xl mb-3">{cat.emoji}</span>
                        <span className="font-black text-lg">{cat.label}</span>
                      </button>
                    ))}
                  </div>
                </div>
                <div className={step === 2 ? 'block animate-fade-in-up' : 'hidden'}>
                  <h3 className="text-2xl font-black mb-6">2. Cultural Roots?</h3>
                  <div className="flex flex-wrap gap-3">
                     {CULTURES.map(c => (
                       <button key={c} onClick={() => { setFormData({...formData, culture: c}); setStep(3); }} className="px-4 py-3 bg-white border-2 border-[#2D2D2D] rounded-xl font-bold hover:bg-[#FFD93D] shadow-sm hover:-translate-y-1 transition-all">
                         {c}
                       </button>
                     ))}
                  </div>
                </div>
                <div className={step === 3 ? 'block animate-fade-in-up' : 'hidden'}>
                  <h3 className="text-2xl font-black mb-6">3. Where is it?</h3>
                  <div className="space-y-4">
                    <div>
                      <label className="text-sm font-black text-gray-500 uppercase mb-1 block">Title</label>
                      <input type="text" placeholder="e.g. Best Bagels Ever" className="w-full p-4 border-2 border-[#2D2D2D] rounded-2xl font-bold bg-white focus:outline-none focus:ring-4 focus:ring-yellow-200" value={formData.actionTitle} onChange={e => setFormData({...formData, actionTitle: e.target.value})} />
                    </div>
                    <div>
                      <label className="text-sm font-black text-gray-500 uppercase mb-1 block">Search Location</label>
                      <div className="flex gap-2 mb-4">
                        <input 
                          type="text" 
                          placeholder="Type postcode or place name..."
                          className="flex-1 p-4 border-2 border-[#2D2D2D] rounded-2xl font-bold bg-white"
                          value={formData.locationName}
                          onChange={(e) => setFormData({...formData, locationName: e.target.value})}
                          onKeyDown={(e) => e.key === 'Enter' && handleSearchLocation()}
                        />
                        <button onClick={handleSearchLocation} className="p-4 bg-[#2D2D2D] text-white rounded-2xl border-2 border-[#2D2D2D] active:scale-95 transition-transform">
                          <Search size={24} />
                        </button>
                      </div>
                      <div className="h-64 border-2 border-[#2D2D2D] rounded-3xl overflow-hidden relative shadow-[4px_4px_0px_0px_rgba(45,45,45,1)]">
                         <LeafletMap pickingMode={true} mapCenter={mapCenter} onLocationSelect={handleMapPin} />
                         {formData.lat && (
                           <div className="absolute top-2 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-1 rounded-full text-xs font-bold shadow-md z-[1000] animate-bounce">
                             📍 Pinned!
                           </div>
                         )}
                      </div>
                    </div>
                    <button onClick={() => setStep(4)} disabled={!formData.lat} className="w-full py-4 bg-[#2D2D2D] text-white font-black text-xl rounded-2xl mt-4 disabled:opacity-50 hover:-translate-y-1 transition-all shadow-[4px_4px_0px_0px_rgba(45,45,45,1)]">Next Step</button>
                  </div>
                </div>
                <div className={step === 4 ? 'block animate-fade-in-up' : 'hidden'}>
                  <h3 className="text-2xl font-black mb-6">4. The Inside Scoop</h3>
                  <textarea className="w-full h-48 p-5 border-2 border-[#2D2D2D] rounded-3xl font-bold text-lg resize-none shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] focus:outline-none focus:ring-4 focus:ring-yellow-200" placeholder="Why is this place special?" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})}></textarea>
                   <button onClick={() => setStep(5)} className="w-full py-4 bg-[#2D2D2D] text-white font-black text-xl rounded-2xl mt-6 shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] hover:-translate-y-1 transition-all">Next</button>
                </div>
                <div className={step >= 5 ? 'block animate-fade-in-up' : 'hidden'}>
                  <h3 className="text-2xl font-black mb-6">5. Final Touches</h3>
                   <div className="relative mb-8">
                     <Hash size={24} className="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400" />
                      <input type="text" placeholder="#HiddenGem #CheapEats" className="w-full p-4 pl-12 border-2 border-[#2D2D2D] rounded-2xl font-bold text-lg" value={formData.tags} onChange={e => setFormData({...formData, tags: e.target.value})} />
                   </div>
                   <button onClick={handleSubmit} disabled={loading} className="w-full py-5 bg-[#FFD93D] border-2 border-[#2D2D2D] text-[#2D2D2D] font-black text-2xl rounded-2xl shadow-[6px_6px_0px_0px_rgba(45,45,45,1)] hover:-translate-y-1 active:translate-y-1 active:shadow-none transition-all">
                     {loading ? 'Publishing...' : '✨ Publish Gem ✨'}
                   </button>
                </div>
              </div>
            </div>
          );
        };

        const DiscoverView = ({ posts, onOpenDetail }) => {
          const [viewMode, setViewMode] = useState('map');
          const [filter, setFilter] = useState('all');
          const [cultureFilter, setCultureFilter] = useState('all');

          const filteredPosts = posts.filter(post => 
            (filter === 'all' || post.category === filter) && 
            (cultureFilter === 'all' || post.culture === cultureFilter)
          );

          return (
            <div className="flex flex-col h-full md:h-auto bg-[#FFFBF0] pt-4 max-w-6xl mx-auto w-full">
              <div className="flex flex-col gap-4 mb-2 px-4 md:px-8 flex-shrink-0 z-10">
                <div className="flex justify-between items-center">
                  <h2 className="text-3xl font-black text-[#2D2D2D]">Discover</h2>
                   <div className="bg-white p-1 rounded-2xl border-2 border-[#2D2D2D] flex shadow-[2px_2px_0px_0px_rgba(45,45,45,1)]">
                      <button onClick={() => setViewMode('list')} className={`px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all ${viewMode === 'list' ? 'bg-[#2D2D2D] text-white' : 'text-gray-500 hover:bg-gray-100'}`}><List size={18}/> List</button>
                      <button onClick={() => setViewMode('map')} className={`px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all ${viewMode === 'map' ? 'bg-[#4D96FF] text-white border border-[#2D2D2D]' : 'text-gray-500 hover:bg-gray-100'}`}><MapIcon size={18}/> Map</button>
                   </div>
                </div>
                <div className="flex flex-col gap-3">
                    <div className="flex gap-3 overflow-x-auto pb-1 scrollbar-hide">
                      <button onClick={() => setFilter('all')} className={`px-5 py-2 rounded-full border-2 font-black whitespace-nowrap text-sm transition-all ${filter === 'all' ? 'bg-[#2D2D2D] text-white' : 'bg-white border-[#2D2D2D] text-[#2D2D2D] hover:bg-gray-100'}`}>All Categories</button>
                      {CATEGORIES.map(cat => (
                        <button key={cat.id} onClick={() => setFilter(cat.id)} className={`px-5 py-2 rounded-full border-2 font-black whitespace-nowrap text-sm flex items-center gap-2 transition-all ${filter === cat.id ? `${cat.color} border-[#2D2D2D] text-[#2D2D2D]` : 'bg-white border-gray-200 text-gray-500 hover:border-[#2D2D2D]'}`}>
                          <span>{cat.emoji}</span> {cat.label}
                        </button>
                      ))}
                    </div>
                    <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide items-center">
                        <div className="flex-shrink-0 mr-2 bg-yellow-100 px-3 py-1 rounded-lg border-2 border-yellow-400 transform -rotate-2 shadow-sm">
                            <span className="text-xs font-black text-yellow-800 uppercase whitespace-nowrap flex items-center gap-1"><Globe size={12}/> Vibe Check</span>
                        </div>
                        <button 
                            onClick={() => setCultureFilter('all')} 
                            className={`px-4 py-1.5 rounded-xl border-2 font-bold whitespace-nowrap text-xs transition-all ${cultureFilter === 'all' ? 'bg-[#2D2D2D] text-white border-[#2D2D2D]' : 'bg-white border-gray-300 text-gray-400 hover:border-[#2D2D2D] hover:text-[#2D2D2D]'}`}
                        >
                            All Roots
                        </button>
                        {CULTURES.map(c => (
                            <button 
                                key={c} 
                                onClick={() => setCultureFilter(c)} 
                                className={`px-4 py-1.5 rounded-xl border-2 font-bold whitespace-nowrap text-xs transition-all ${cultureFilter === c ? 'bg-[#FFD93D] border-[#2D2D2D] text-[#2D2D2D] shadow-sm' : 'bg-white border-gray-300 text-gray-400 hover:border-[#2D2D2D] hover:text-[#2D2D2D]'}`}
                            >
                                {c}
                            </button>
                        ))}
                    </div>
                </div>
              </div>

              {/* Updated Map Container Style:
                 - Added 'md:h-[180vh]' to force height on desktop screens (approx 2x previous).
                 - Kept existing logic for mobile.
              */}
              <div className={`flex-1 min-h-0 relative ${viewMode === 'map' ? 'w-full h-full md:h-[180vh]' : 'rounded-3xl border-2 border-[#2D2D2D] bg-white shadow-sm mx-4 md:mx-8 mb-24 overflow-hidden'}`}>
                {viewMode === 'map' ? (
                     <LeafletMap markers={filteredPosts} onMarkerClick={onOpenDetail} />
                ) : (
                  <div className="overflow-y-auto h-full p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                     {filteredPosts.length === 0 ? (
                        <div className="col-span-full flex flex-col items-center justify-center text-gray-400 h-64">
                            <div className="text-4xl mb-2 grayscale">👻</div>
                            <p className="font-bold">No gems found for this specific vibe combo.</p>
                        </div>
                     ) : (
                        filteredPosts.map(post => {
                            const cat = CATEGORIES.find(c => c.id === post.category) || CATEGORIES[0];
                            return (
                            <div key={post.id} onClick={() => onOpenDetail(post)} className="bg-white border-2 border-[#2D2D2D] rounded-2xl p-4 shadow-sm hover:shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] hover:-translate-y-1 cursor-pointer transition-all flex items-center gap-4">
                                <div className={`w-16 h-16 rounded-2xl border-2 border-[#2D2D2D] flex items-center justify-center text-3xl flex-shrink-0 ${cat.color}`}>{cat.emoji}</div>
                                <div>
                                <h3 className="font-black text-[#2D2D2D] text-lg leading-tight mb-1">{post.actionTitle}</h3>
                                <p className="text-xs font-bold text-gray-400 flex items-center"><MapPin size={12} className="mr-1"/> {post.locationName}</p>
                                <div className="mt-2 inline-block px-2 py-0.5 bg-gray-100 rounded-md text-[10px] font-bold text-gray-500 uppercase">{post.culture}</div>
                                </div>
                            </div>
                            )
                        })
                     )}
                  </div>
                )}
              </div>
            </div>
          );
        };

        const ProfileView = ({ savedPosts, posts, myPosts, onDeletePost, toggleSave, onOpenDetail, onEditPost }) => {
          const [activeTab, setActiveTab] = useState('collection'); 
          const [showDbConfig, setShowDbConfig] = useState(false);
          const collectionList = posts.filter(p => savedPosts.includes(p.id));
          const footprintList = myPosts; 
          
          const contributionCount = footprintList.length;
          const badges = [
            { id: 1, name: "Newbie Explorer", icon: "🌱", condition: contributionCount >= 1 },
            { id: 2, name: "Taste Guide", icon: "🍜", condition: contributionCount >= 5 },
            { id: 3, name: "Urban Legend", icon: "👑", condition: contributionCount >= 10 },
          ];

          const randomRoute = useMemo(() => {
            const source = collectionList.length >= 3 ? collectionList : (posts.length >= 3 ? posts : []);
            if (source.length < 3) return null;
            const shuffled = [...source].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, 3);
          }, [collectionList, posts]);

          return (
            <div className="flex flex-col h-full bg-[#FFFBF0] px-4 md:px-8 pt-6 max-w-4xl mx-auto w-full overflow-y-auto pb-32">
              <div className="bg-white border-2 border-[#2D2D2D] rounded-[32px] p-6 shadow-[6px_6px_0px_0px_rgba(45,45,45,1)] mb-8 relative overflow-hidden">
                <button 
                  onClick={() => setShowDbConfig(true)}
                  className="absolute top-4 right-4 text-gray-300 hover:text-gray-500 z-20 hover:rotate-90 transition-all"
                  title="Database Settings"
                >
                  <Settings size={24}/>
                </button>
                <div className="absolute -right-4 -top-4 w-32 h-32 bg-yellow-300 rounded-full opacity-50 blur-2xl"></div>
                <div className="flex flex-col md:flex-row items-center gap-6 relative z-10">
                   <div className="w-24 h-24 bg-[#FFD93D] rounded-full border-4 border-[#2D2D2D] flex items-center justify-center text-5xl shadow-sm">😎</div>
                   <div className="text-center md:text-left flex-1">
                     <h2 className="text-3xl font-black text-[#2D2D2D]">Explorer One</h2>
                     <p className="text-gray-500 font-bold mb-3">Level {Math.floor(contributionCount / 3) + 1} • {contributionCount} Contributions</p>
                     <div className="flex gap-2 justify-center md:justify-start">
                       {badges.map(b => (
                         <div key={b.id} className={`w-10 h-10 rounded-full border-2 border-[#2D2D2D] flex items-center justify-center text-xl bg-white ${b.condition ? 'opacity-100' : 'opacity-30 grayscale'}`} title={b.name}>
                           {b.icon}
                         </div>
                       ))}
                     </div>
                   </div>
                </div>
              </div>

              <div className="flex mb-6 bg-white p-1 rounded-2xl border-2 border-[#2D2D2D] shadow-sm">
                <button onClick={() => setActiveTab('collection')} className={`flex-1 py-3 rounded-xl font-black text-lg transition-all ${activeTab === 'collection' ? 'bg-[#FFD93D] text-[#2D2D2D] border-2 border-[#2D2D2D] shadow-sm' : 'text-gray-400 hover:bg-gray-50'}`}>My Collection 📌</button>
                <button onClick={() => setActiveTab('footprint')} className={`flex-1 py-3 rounded-xl font-black text-lg transition-all ${activeTab === 'footprint' ? 'bg-[#6BCB77] text-white border-2 border-[#2D2D2D] shadow-sm' : 'text-gray-400 hover:bg-gray-50'}`}>My Footprints 👣</button>
              </div>

              <div className="space-y-4 animate-fade-in-up">
                {activeTab === 'collection' && randomRoute && (
                  <div className="bg-[#E0F7FA] border-2 border-[#2D2D2D] rounded-3xl p-5 mb-6 relative shadow-[4px_4px_0px_0px_rgba(45,45,45,1)] hover:-translate-y-1 transition-transform">
                     <div className="absolute -top-3 -right-3 bg-white border-2 border-[#2D2D2D] px-3 py-1 rounded-lg font-black text-xs uppercase transform rotate-6 shadow-sm">Today's Vibe</div>
